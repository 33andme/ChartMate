        body {
            background: #120e24;

            padding: 60px 0;

        .icon-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
            max-width: 800px;
            margin: 0 auto;
            justify-items: center;
        }
        .icon {
            width: 180px;
            height: 180px;
            transition: transform 0.45s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.4s ease;
            cursor: pointer;
            transform-origin: center center;
        }
        .icon:hover {
            transform: scale(1.35);
            filter: brightness(1.3) drop-shadow(0 0 20px #a87bff) drop-shadow(0 0 30px #7b4bcc);
        }

            background: #120e24;
