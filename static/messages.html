<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私信聊天 - 一起算算</title>
  <link rel="stylesheet" href="/static/common.css">
  <style>
    .chat-container {
      display: flex; height: 100dvh; max-height: calc(100dvh - 70px);
      background: var(--bg-primary);
    }

    /* 左侧聊天室列表 */
    .chat-list {
      width: 320px; border-right: 1px solid var(--border-subtle);
      background: var(--bg-card); display: flex; flex-direction: column;
    }
    .chat-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: space-between; 
    }
    .chat-title {
      font-size: 18px; font-weight: 700; color: var(--text-primary);
    }
    .new-chat-btn {
      background: var(--primary-500); color: white;
      border: none; border-radius: 6px; padding: 6px 12px;
      font-size: 12px; cursor: pointer;
    }
    .view-friends-btn {
      background: rgba(124,58,237,.1); color: var(--primary-500);
      border: 1px solid rgba(124,58,237,.2); border-radius: 6px;
      padding: 5px 10px; font-size: 12px; cursor: pointer;
      margin-right: 8px;
    }
    .chat-rooms {
      flex: 1; overflow-y: auto;
    }
    .room-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid var(--border-subtle);
      cursor: pointer; transition: background .15s;
    }
    .room-item:hover { background: var(--bg-subtle); }
    .room-item.active { background: rgba(124,58,237,.1); }
    .room-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--gradient-purple);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 16px;
    }
    .room-info {
      flex: 1; min-width: 0;
    }
    .room-name {
      font-size: 14px; font-weight: 600; margin-bottom: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .room-last-msg {
      font-size: 12px; color: var(--text-muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .room-meta {
      display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
    }
    .room-time {
      font-size: 10px; color: var(--text-muted);
    }
    .unread-badge {
      background: #ef4444; color: white;
      border-radius: 10px; padding: 2px 6px;
      font-size: 10px; font-weight: 600; min-width: 16px;
      text-align: center; display: none;
    }
    .unread-badge.show { display: block; }

    /* 右侧聊天窗口 */
    .chat-window {
      flex: 1; display: flex; flex-direction: column;
    }
    .chat-window-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-card);
    }
    .current-chat-name {
      font-size: 16px; font-weight: 600; color: var(--text-primary);
    }
    .messages-container {
      flex: 1; padding: 16px 20px; overflow-y: auto;
      background: var(--bg-subtle);
    }
    .message {
      display: flex; margin-bottom: 16px; align-items: flex-end; gap: 8px;
    }
    .message.mine { flex-direction: row-reverse; }
    .message-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--gradient-purple);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 12px; font-weight: 600;
      flex-shrink: 0;
    }
    .message.mine .message-avatar { background: var(--primary-500); }
    .message-bubble {
      padding: 10px 10px;
      border-radius: 18px; line-height: 1.4;
      position: relative;
      word-wrap: break-word;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .message.mine .message-bubble {
      background: var(--primary-500); color: white;
      border-bottom-right-radius: 4px;
    }
    .message:not(.mine) .message-bubble {
      background: white; color: var(--text-primary);
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: 4px;
    }
    body.light .message:not(.mine) .message-bubble {
      background: white;
    }
    body:not(.light) .message:not(.mine) .message-bubble {
      background: var(--bg-card);
    }
    .message-time {
      font-size: 10px; color: var(--text-muted);
      margin-top: 2px; text-align: center;
    }

    /* 输入区域 */
    .chat-input {
      padding: 16px 20px; background: var(--bg-card);
      border-top: 1px solid var(--border-subtle);
      display: flex; gap: 12px; align-items: flex-end;
    }
    .input-field {
      flex: 1; min-height: 36px; max-height: 100px;
      border: 1px solid var(--border-subtle); border-radius: 18px;
      padding: 8px 16px; font-size: 14px; resize: none;
      background: var(--bg-primary); color: var(--text-primary);
      overflow-y: auto;
    }
    .input-field:focus {
      outline: none; border-color: var(--primary-500);
    }
    .send-btn {
      width: 36px; height: 36px; border: none; border-radius: 50%;
      background: var(--primary-500); color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 14px; flex-shrink: 0;
    }
    .send-btn:hover { background: var(--primary-600); }
    .send-btn:disabled {
      background: var(--bg-muted); color: var(--text-muted);
      cursor: not-allowed;
    }

    /* 空状态 */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); text-align: center;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-text { font-size: 14px; }

    /* 响应式 */
    @media (max-width: 768px) {
      .chat-list {
        width: 100%; position: absolute; left: 0; top: 0;
        z-index: 100; display: none;
      }
      .chat-list.show { display: flex; }
      .chat-window { width: 100%; }
      .back-to-list {
        background: none; border: none; color: var(--text-muted);
        font-size: 18px; cursor: pointer; margin-right: 12px;
      }
    }

    .loading {
      text-align: center; padding: 40px; color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <!-- 左侧聊天室列表 -->
    <div class="chat-list" id="chat-list">
      <div class="chat-header">
        <div class="chat-title">私信</div>
        <div>
          <button class="view-friends-btn" onclick="viewFriends()">好友列表</button>
        </div>
      </div>
      <div class="chat-rooms" id="chat-rooms">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <!-- 右侧聊天窗口 -->
    <div class="chat-window" id="chat-window">
      <div class="chat-window-header" id="chat-header" style="display:none">
        <button class="back-to-list" onclick="showChatList()" style="display:none">←</button>
        <div class="current-chat-name" id="current-chat-name">--</div>
      </div>

      <div class="messages-container" id="messages-container">
        <div class="empty-state">
          <div class="empty-icon">💬</div>
          <div class="empty-text">选择一个聊天开始对话</div>
        </div>
      </div>

      <div class="chat-input" id="chat-input" style="display:none">
        <textarea class="input-field" id="message-input" placeholder="输入消息..."
                  onkeydown="handleInputKeydown(event)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
      </div>
    </div>
  </div>


  <script src="/static/common.js"></script>
  <script>
  let currentRoomId = null;
  let currentTargetUser = null;
  let chatRooms = [];

  async function init() {
    if (!Auth.requireLogin()) return;
    await loadChatRooms();

    // 检查URL参数中是否有指定的房间ID
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');
    if (roomId) {
      const room = chatRooms.find(r => r.id == roomId);
      if (room) {
        // 找到指定聊天室并打开
        openChat(room.id, room.target_user.name, room.target_user.id);
      }
    }
  }

  async function loadChatRooms() {
    try {
      const data = await api.get('/api/chats');
      // 适配API返回结构：将 room_id 映射为 id，将 other_user 映射为 target_user
      chatRooms = data.chat_rooms.map(room => ({
        id: room.room_id,
        target_user: {
          id: room.other_user.id,
          name: room.other_user.email.split('@')[0], // 使用邮箱用户名作为显示名称
          email: room.other_user.email
        },
        last_message: room.last_message.content,
        updated_at: room.last_message.created_at,
        unread_count: room.unread_count
      }));
      renderChatRooms();
    } catch (err) {
      document.getElementById('chat-rooms').innerHTML =
        `<div style="text-align:center;padding:40px;color:var(--text-muted)">
           加载失败：${err.message}
           <div style="margin-top:20px">
             <button class="btn-primary" onclick="loadMockChatRooms()">使用模拟数据</button>
           </div>
         </div>`;
    }
  }

  // 加载模拟聊天室数据
  function loadMockChatRooms() {
    chatRooms = [
      {
        id: 1,
        target_user: { id: 101, name: "星语星愿" },
        last_message: "你好，能帮我看看我的星盘吗？",
        updated_at: new Date(Date.now() - 3600000).toISOString(),
        unread_count: 2
      },
      {
        id: 2,
        target_user: { id: 102, name: "占星小达人" },
        last_message: "谢谢你的解析，非常准确！",
        updated_at: new Date(Date.now() - 7200000).toISOString(),
        unread_count: 0
      },
      {
        id: 3,
        target_user: { id: 103, name: "星座研究员" },
        last_message: "我是天蝎座的，我们来交流一下吧",
        updated_at: new Date(Date.now() - 86400000).toISOString(),
        unread_count: 0
      }
    ];
    renderChatRooms();
    toast('已加载模拟数据', 'info');

    // 检查URL参数，如果有room参数并且是模拟ID，创建对应的模拟聊天室
    const urlParams = new URLSearchParams(window.location.search);
    const roomParam = urlParams.get('room');
    if (roomParam && roomParam.startsWith('mock_')) {
      const targetId = parseInt(roomParam.split('_')[1]);
      if (targetId) {
        // 添加一个模拟聊天室
        const mockRoom = {
          id: 999,
          target_user: { id: targetId, name: `用户${targetId}` },
          last_message: "模拟聊天",
          updated_at: new Date().toISOString(),
          unread_count: 0
        };
        chatRooms.unshift(mockRoom);
        renderChatRooms();

        // 打开这个聊天室
        openChat(mockRoom.id, mockRoom.target_user.name, mockRoom.target_user.id);
      }
    }
  }

  function renderChatRooms() {
    const container = document.getElementById('chat-rooms');

    if (chatRooms.length === 0) {
      container.innerHTML = `
        <div style="text-align:center;padding:40px;color:var(--text-muted)">
          <div style="font-size:32px;margin-bottom:12px">💬</div>
          <div>还没有聊天记录</div>
          <div style="font-size:12px;margin-top:8px">点击"新建聊天"开始对话</div>
        </div>`;
      return;
    }

    const html = chatRooms.map(room => `
      <div class="room-item" onclick="openChat(${room.id}, '${room.target_user.name}', ${room.target_user.id})">
        <div class="room-avatar">${room.target_user.name.charAt(0).toUpperCase()}</div>
        <div class="room-info">
          <div class="room-name">${room.target_user.name}</div>
          <div class="room-last-msg">${room.last_message || '开始聊天...'}</div>
        </div>
        <div class="room-meta">
          <div class="room-time">${formatTime(room.updated_at)}</div>
          <div class="unread-badge ${room.unread_count > 0 ? 'show' : ''}">${room.unread_count || 0}</div>
        </div>
      </div>
    `).join('');

    container.innerHTML = html;
  }

  async function openChat(roomId, userName, userId) {
    currentRoomId = roomId;
    currentTargetUser = { name: userName, id: userId };

    // 更新UI状态
    document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');

    document.getElementById('current-chat-name').textContent = userName;
    document.getElementById('chat-header').style.display = 'block';
    document.getElementById('chat-input').style.display = 'flex';

    // 移动端隐藏聊天列表
    if (window.innerWidth <= 768) {
      document.getElementById('chat-list').classList.remove('show');
      document.querySelector('.back-to-list').style.display = 'block';
    }

    // 加载消息
    await loadMessages(roomId);
  }

  async function loadMessages(roomId) {
    const container = document.getElementById('messages-container');
    container.innerHTML = '<div class="loading">加载消息中...</div>';

    try {
      // 添加错误处理，如果roomId是mock_开头，直接加载模拟数据
      if (roomId === 999 || (typeof roomId === 'string' && roomId.startsWith('mock_'))) {
        loadMockMessages(roomId);
        return;
      }

      const data = await api.get(`/api/chats/${roomId}/messages`);
      renderMessages(data.messages);
    } catch (err) {
      container.innerHTML = `
        <div style="text-align:center;color:var(--text-muted)">
          <p>加载失败：${err.message}</p>
          <div style="margin-top:20px">
            <button class="btn-primary" onclick="loadMockMessages(${roomId})">使用模拟数据</button>
          </div>
        </div>`;
    }
  }

  // 加载模拟消息
  function loadMockMessages(roomId) {
    const mockMessages = [
      {
        sender: { is_me: false, email: "user@example.com" },
        content: "你好，能给我算算我的星盘吗？",
        created_at: new Date(Date.now() - 3600000).toISOString()
      },
      {
        sender: { is_me: true, email: "me@example.com" },
        content: "当然可以，请告诉我你的出生日期、时间和地点。",
        created_at: new Date(Date.now() - 3500000).toISOString()
      },
      {
        sender: { is_me: false, email: "user@example.com" },
        content: "1995年5月20日，下午3点，北京",
        created_at: new Date(Date.now() - 3400000).toISOString()
      },
      {
        sender: { is_me: true, email: "me@example.com" },
        content: "好的，稍等，我来计算一下...",
        created_at: new Date(Date.now() - 1800000).toISOString()
      }
    ];

    renderMessages(mockMessages);
    toast('已加载模拟消息数据', 'info');
  }

  function renderMessages(messages) {
    const container = document.getElementById('messages-container');

    if (messages.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">👋</div>
          <div class="empty-text">开始你们的对话吧！</div>
        </div>`;
      return;
    }

    const html = messages.map(msg => `
      <div class="message ${msg.sender.is_me ? 'mine' : ''}">
        <div class="message-avatar">${msg.sender.email.charAt(0).toUpperCase()}</div>
        <div>
          <div class="message-bubble">${escapeHtml(msg.content)}</div>
          <div class="message-time">${formatTime(msg.created_at)}</div>
        </div>
      </div>
    `).join('');

    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    if (!currentRoomId) return;

    const input = document.getElementById('message-input');
    const content = input.value.trim();
    if (!content) return;

    const sendBtn = document.getElementById('send-btn');
    sendBtn.disabled = true;

    try {
      await api.post('/api/chats/send', {
        room_id: currentRoomId,
        content: content
      });

      input.value = '';
      await loadMessages(currentRoomId);
      await loadChatRooms(); // 更新聊天室列表

    } catch (err) {
      toast(`发送失败: ${err.message}，将使用模拟功能`, 'warning');

      // 模拟消息发送
      input.value = '';

      // 添加当前消息到DOM
      const container = document.getElementById('messages-container');
      const msgElement = document.createElement('div');
      msgElement.className = 'message mine';
      msgElement.innerHTML = `
        <div class="msg-avatar">${svgIcon('user') || '👤'}</div>
        <div>
          <div class="msg-bubble user">${escapeHtml(content)}</div>
          <div class="msg-time">刚刚</div>
        </div>
      `;
      container.appendChild(msgElement);
      container.scrollTop = container.scrollHeight;

    } finally {
      sendBtn.disabled = false;
      updateSendButton();
    }
  }

  function handleInputKeydown(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      sendMessage();
    }
    updateSendButton();
  }

  function updateSendButton() {
    const input = document.getElementById('message-input');
    const btn = document.getElementById('send-btn');
    btn.disabled = !input.value.trim();
  }

  // 新建聊天相关
  function showNewChatModal() {
    document.getElementById('new-chat-modal').classList.add('show');
  }

  function viewFriends() {
    window.location.href = '/static/friends.html';
  }

  function backToCommunity() {
    window.location.href = '/static/community.html';
  }

  function hideNewChatModal() {
    document.getElementById('new-chat-modal').classList.remove('show');
    document.getElementById('target-email').value = '';
  }

  async function startNewChat() {
    const email = document.getElementById('target-email').value.trim();
    if (!email) {
      toast('请输入对方邮箱地址', 'warning');
      return;
    }

    try {
      // 先查找用户ID（这里需要添加一个API来根据邮箱查找用户）
      const userData = await api.get(`/api/auth/check-email?email=${encodeURIComponent(email)}`);
      if (!userData.exists) {
        toast('用户不存在', 'error');
        return;
      }

      const result = await api.post('/api/chats', {
        target_user_id: userData.user_id
      });

      hideNewChatModal();
      await loadChatRooms();

      // 找到新聊天室并打开
      const room = chatRooms.find(r => r.id === result.room_id);
      if (room) {
        openChat(room.id, room.target_user.name, room.target_user.id);
      } else {
        // 如果没找到聊天室，可能需要刷新页面或显示一个提示
        toast('聊天创建成功，请刷新页面查看', 'success');
      }

    } catch (err) {
      toast(err.message, 'error');
    }
  }

  function showChatList() {
    document.getElementById('chat-list').classList.add('show');
  }

  function formatTime(isoString) {
    const date = new Date(isoString);
    const now = new Date();
    const diffMs = now.getTime() - date.getTime();
    const diffMins = Math.floor(diffMs / 60000);

    if (diffMins < 1) return '刚刚';
    if (diffMins < 60) return `${diffMins}分钟前`;
    if (diffMins < 1440) return `${Math.floor(diffMins/60)}小时前`;

    const diffDays = Math.floor(diffMins / 1440);
    if (diffDays < 7) return `${diffDays}天前`;

    return date.toLocaleDateString();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // 监听输入框内容变化
  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('message-input');
    input?.addEventListener('input', updateSendButton);
  });

  init();
  </script>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <a href="/static/index.html" class="nav-item">
      <span class="nav-icon">🏠</span><span>首页</span>
    </a>
    <a href="/static/chat.html" class="nav-item">
      <span class="nav-icon">🤖</span><span>AI问答</span>
    </a>
    <a href="/static/community.html" class="nav-item active">
      <span class="nav-icon">💫</span><span>社区</span>
    </a>
    <a href="/static/me.html" class="nav-item">
      <span class="nav-icon">👤</span><span>我的</span>
    </a>
  </nav>

</body>
</html>
