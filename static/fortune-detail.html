<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日运势详情 - 一起算算</title>
  <link rel="stylesheet" href="/static/common.css">
  <style>
    /* ── 顶部返回栏 ── */
    .back-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border-subtle);
    }
    .btn-back {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background .15s;
      line-height: 1;
    }
    .btn-back:hover { background: rgba(124,58,237,.1); }
    .back-title { font-size: 16px; font-weight: 700; }
    .back-date  { font-size: 12px; color: var(--text-muted); margin-left: auto; }

    /* ── 档案卡 ── */
    .profile-hero {
      background: linear-gradient(160deg, #130527 0%, #0b0b18 55%);
      padding: 24px;
      text-align: center;
    }
    body.light .profile-hero {
      background: linear-gradient(160deg, #e8e0ff 0%, #f2edff 60%);
    }
    .profile-hero .ph-emoji { font-size: 52px; margin-bottom: 8px; }
    .profile-hero .ph-name  { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .profile-hero .ph-signs { font-size: 13px; color: var(--text-muted); }

    /* ── 总分大字 ── */
    .overall-banner {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-card);
      padding: 28px 24px;
      margin: 0 24px 16px;
      margin-top: -20px;
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: var(--shadow-card);
    }
    .ob-score {
      font-size: 72px;
      font-weight: 900;
      line-height: 1;
      background: var(--gradient-purple);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      flex-shrink: 0;
    }
    .ob-right { flex: 1; }
    .ob-label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    .ob-summary { font-size: 14px; line-height: 1.65; }

    /* ── 六维分数 ── */
    .scores-card .score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .scores-card .score-row:last-child { border-bottom: none; }
    .sr-icon { font-size: 20px; flex-shrink: 0; }
    .sr-label { font-size: 14px; width: 54px; flex-shrink: 0; }
    .sr-bar {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,.08);
      border-radius: 3px;
      overflow: hidden;
    }
    body.light .sr-bar { background: rgba(0,0,0,.07); }
    .sr-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1.1s cubic-bezier(.4,0,.2,1);
    }
    .sr-val { font-size: 14px; font-weight: 700; width: 28px; text-align: right; flex-shrink: 0; }

    /* ── 内容卡 ── */
    .content-cards {
      padding: 0 24px 16px;
      display: grid;
      gap: 12px;
    }
    .cc {
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .cc.advice { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.25); }
    .cc.avoid  { background: rgba(239,68,68,.08);  border: 1px solid rgba(239,68,68,.2); }
    .cc .cc-icon {
      font-size: 28px;
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .cc.advice .cc-icon { background: rgba(16,185,129,.15); }
    .cc.avoid  .cc-icon { background: rgba(239,68,68,.1); }
    .cc .cc-title { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; opacity: .7; margin-bottom: 5px; }
    .cc .cc-text  { font-size: 14px; line-height: 1.65; }

    /* ── 幸运卡 ── */
    .lucky-section {
      padding: 0 24px 24px;
    }
    .lucky-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .lc {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 16px 12px;
      text-align: center;
      box-shadow: var(--shadow-card);
    }
    .lc .lc-icon { font-size: 24px; margin-bottom: 6px; }
    .lc .lc-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .lc .lc-val { font-size: 15px; font-weight: 700; }

    /* 幸运色色块 */
    .color-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      margin: 0 auto 6px;
      border: 2px solid rgba(255,255,255,.15);
    }
  </style>
</head>
<body>
  <!-- 返回栏 -->
  <div class="back-bar">
    <button class="btn-back" onclick="history.back()">←</button>
    <span class="back-title">今日运势详情</span>
    <span class="back-date" id="detail-date"></span>
  </div>

  <!-- 档案信息 -->
  <div class="profile-hero" id="profile-hero">
    <div class="ph-emoji" id="ph-emoji">⭐</div>
    <div class="ph-name"  id="ph-name">--</div>
    <div class="ph-signs" id="ph-signs">--</div>
  </div>

  <!-- 总分 -->
  <div class="overall-banner" id="overall-banner">
    <div class="ob-score" id="ob-score">--</div>
    <div class="ob-right">
      <div class="ob-label">今日综合运势</div>
      <div class="ob-summary" id="ob-summary">加载中...</div>
    </div>
  </div>

  <div class="page-content" style="padding:0 24px 12px">
    <!-- 六维分数 -->
    <div class="section-title">六维运势</div>
    <div class="card scores-card" id="scores-card" style="padding:12px 20px">
      <div style="text-align:center;padding:16px"><span class="spinner"></span></div>
    </div>
  </div>

  <!-- 建议 & 注意 -->
  <div class="content-cards" id="content-cards">
    <div style="text-align:center;padding:20px;color:var(--text-muted)"><span class="spinner"></span></div>
  </div>

  <!-- 幸运元素 -->
  <div class="lucky-section" id="lucky-section" style="display:none">
    <div class="section-title" style="padding:0 0 12px">幸运元素</div>
    <div class="lucky-grid" id="lucky-grid"></div>
  </div>

  <!-- 星象解读 -->
  <div class="planet-section" id="planet-section" style="display:none; padding:0 24px 24px;">
    <div class="section-title" style="padding:0 0 12px">今日星象解读</div>
    <div class="card" style="padding:16px">
      <div id="planet-insight" style="font-size:14px; line-height:1.6;"></div>
      <div id="calculation-method" style="margin-top:12px; font-size:11px; color:var(--text-muted);"></div>
    </div>
  </div>

  <script src="/static/common.js"></script>
  <script>
    const SCORE_ITEMS = [
      { label:'爱情', key:'love',   icon:'💕' },
      { label:'财富', key:'wealth', icon:'💰' },
      { label:'事业', key:'career', icon:'💼' },
      { label:'学习', key:'study',  icon:'📚' },
      { label:'人际', key:'social', icon:'🤝' },
    ];

    const COLOR_MAP = {
      '红色':'#ef4444','橙色':'#f97316','黄色':'#eab308','绿色':'#22c55e',
      '蓝色':'#3b82f6','紫色':'#a855f7','粉色':'#ec4899','白色':'#f8fafc',
      '金色':'#f59e0b','银色':'#94a3b8','青色':'#06b6d4','棕色':'#92400e',
    };

    function init() {
      const raw = sessionStorage.getItem('fortune_data');
      const rawP = sessionStorage.getItem('fortune_profile');
      if (!raw) { history.back(); return; }

      const data = JSON.parse(raw);
      const profile = rawP ? JSON.parse(rawP) : null;

      document.getElementById('detail-date').textContent = data.date || '';

      // 档案信息
      if (profile) {
        document.getElementById('ph-emoji').textContent  = signEmoji(profile.sun_sign_cn) || '⭐';
        document.getElementById('ph-name').textContent   = profile.name;
        document.getElementById('ph-signs').textContent  =
          `☀️ ${profile.sun_sign_cn}  ·  🌙 ${profile.moon_sign_cn}  ·  ⬆️ ${profile.asc_sign_cn}`;
      }

      const { scores, content } = data;

      // 总分
      document.getElementById('ob-score').textContent  = scores.overall;
      document.getElementById('ob-summary').textContent = content.summary || '';

      // 六维
      document.getElementById('scores-card').innerHTML = SCORE_ITEMS.map(item => `
        <div class="score-row">
          <span class="sr-icon">${item.icon}</span>
          <span class="sr-label">${item.label}</span>
          <div class="sr-bar">
            <div class="sr-fill" style="width:0%;background:${scoreColor(scores[item.key])}"
                 data-target="${scores[item.key]}"></div>
          </div>
          <span class="sr-val" style="color:${scoreColor(scores[item.key])}">${scores[item.key]}</span>
        </div>
      `).join('');

      // 建议 & 注意
      document.getElementById('content-cards').innerHTML = `
        <div class="cc advice">
          <div class="cc-icon">💡</div>
          <div>
            <div class="cc-title">今日建议</div>
            <div class="cc-text">${content.advice}</div>
          </div>
        </div>
        <div class="cc avoid">
          <div class="cc-icon">⚠️</div>
          <div>
            <div class="cc-title">今日注意</div>
            <div class="cc-text">${content.avoid}</div>
          </div>
        </div>
      `;

      // 幸运元素
      const colorHex = COLOR_MAP[content.lucky_color] || '#a78bfa';
      document.getElementById('lucky-grid').innerHTML = `
        <div class="lc">
          <div class="color-dot" style="background:${colorHex}"></div>
          <div class="lc-label">幸运色</div>
          <div class="lc-val">${content.lucky_color}</div>
        </div>
        <div class="lc">
          <div class="lc-icon">🔢</div>
          <div class="lc-label">幸运数字</div>
          <div class="lc-val" style="font-size:22px;font-weight:900;background:var(--gradient-purple);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${content.lucky_number}</div>
        </div>
        <div class="lc">
          <div class="lc-icon">🧭</div>
          <div class="lc-label">幸运方位</div>
          <div class="lc-val">${content.lucky_direction}</div>
        </div>
      `;
      document.getElementById('lucky-section').style.display = 'block';

      // 显示星象解读，如果有的话
      if (content.planet_insight) {
        document.getElementById('planet-insight').innerHTML = content.planet_insight;

        // 显示计算方法信息
        let calcMethod = '基于模拟数据';
        if (data.calculation_method === 'flatlib') {
          calcMethod = '基于真实天文数据 (Swiss Ephemeris)';
        }
        document.getElementById('calculation-method').textContent = `计算方法: ${calcMethod}`;
        document.getElementById('planet-section').style.display = 'block';
      }

      // 进度条动画（延迟一帧）
      requestAnimationFrame(() => {
        document.querySelectorAll('.sr-fill').forEach(el => {
          el.style.width = el.dataset.target + '%';
        });
      });
    }

    init();
  </script>
</body>
</html>
