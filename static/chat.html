<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AI 占星师 - 占星APP</title>
  <link rel="stylesheet" href="/static/common.css">
  <style>
    body { display: flex; flex-direction: column; height: 100dvh; padding-bottom: 70px; }

    /* ── 聊天区域 ── */
    .chat-header {
      padding: 12px 16px;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .chat-avatar {
      width: 40px; height: 40px;
      background: var(--gradient-purple);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .chat-profile-info { flex: 1; }
    .chat-profile-info .cp-name { font-size: 14px; font-weight: 600; }
    .chat-profile-info .cp-sign { font-size: 11px; color: var(--text-muted); }
    .btn-change-profile {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 12px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .msg-avatar.ai { background: rgba(124,58,237,0.2); }
    .msg-avatar.user { background: rgba(59,130,246,0.2); }

    .msg-bubble {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .msg-bubble.ai {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: 4px;
    }
    .msg-bubble.user {
      background: var(--gradient-purple);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* 打字指示器 */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 10px 14px;
    }
    .typing-dot {
      width: 7px; height: 7px;
      background: var(--accent-purple);
      border-radius: 50%;
      animation: typingPulse 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingPulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* ── 输入区域 ── */
    .chat-input-area {
      padding: 12px 16px;
      background: var(--nav-bg);
      border-top: 1px solid var(--border-subtle);
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      bottom: 0;
    }

    .quick-questions {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      margin-bottom: 10px;
      padding: 2px 0;
    }
    .quick-questions::-webkit-scrollbar { display: none; }
    .quick-q {
      flex-shrink: 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-subtle);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .quick-q:hover { border-color: var(--accent-purple); color: #a78bfa; }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-textarea {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 11px 14px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.5;
      font-family: inherit;
    }
    .chat-textarea:focus { border-color: var(--accent-purple); }
    .btn-send {
      width: 42px; height: 42px;
      background: var(--gradient-purple);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
      box-shadow: 0 4px 12px rgba(124,58,237,0.4);
    }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    /* VIP 提示横幅 */
    .vip-banner {
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(239,68,68,0.1));
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 12px;
      padding: 10px 14px;
      margin: 0 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
    }
    .vip-banner span { color: #fbbf24; }
    .btn-vip { color: #f59e0b; font-size: 12px; background: none; border: none; cursor: pointer; }

    /* 档案选择模态 */
    .profile-select-list { display: flex; flex-direction: column; gap: 10px; }
    .profile-select-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .profile-select-item.selected { border-color: var(--accent-purple); background: rgba(124,58,237,0.08); }
    .profile-select-item .psi-sign { font-size: 28px; }
    .profile-select-item .psi-name { font-size: 14px; font-weight: 600; }
    .profile-select-item .psi-sign-text { font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>
  <!-- 对话头部 -->
  <div class="chat-header">
    <div class="chat-avatar">🔮</div>
    <div class="chat-profile-info">
      <div class="cp-name" id="cp-name">加载中...</div>
      <div class="cp-sign" id="cp-sign">--</div>
    </div>
    <button class="btn-change-profile" onclick="openModal('profile-select-modal')">切换</button>
    <button class="top-bar-action" onclick="clearHistory()" title="清空记录">🗑️</button>
  </div>

  <!-- VIP 横幅（非VIP显示） -->
  <div class="vip-banner" id="vip-banner" style="display:none;margin-top:8px">
    <span>✨ 当前使用免费模式，升级 VIP 获得更智慧的占星解读</span>
    <button class="btn-vip">升级 ›</button>
  </div>

  <!-- 消息列表 -->
  <div class="chat-messages" id="chat-messages">
    <div class="msg-row">
      <div class="msg-avatar ai">🔮</div>
      <div>
        <div class="msg-bubble ai">
          你好！我是你的专属AI占星师 ✨<br>
          请先选择一个档案，我将根据TA的星盘为你解读命运之书。<br><br>
          你可以问我：今天运势如何？我和伴侣合适吗？近期事业有什么机遇？
        </div>
        <div class="msg-time">刚刚</div>
      </div>
    </div>
  </div>

  <!-- 输入区域 -->
  <div class="chat-input-area">
    <div class="quick-questions" id="quick-questions">
      <div class="quick-q" onclick="sendQuickQ(this)">今日运势怎么样？</div>
      <div class="quick-q" onclick="sendQuickQ(this)">我的太阳星座特质</div>
      <div class="quick-q" onclick="sendQuickQ(this)">近期感情运势</div>
      <div class="quick-q" onclick="sendQuickQ(this)">本月财运分析</div>
      <div class="quick-q" onclick="sendQuickQ(this)">我适合什么职业？</div>
      <div class="quick-q" onclick="sendQuickQ(this)">上升星座对我的影响</div>
    </div>
    <div class="input-row">
      <textarea class="chat-textarea" id="msg-input" rows="1"
        placeholder="向占星师提问..." maxlength="500"
        onkeydown="handleEnter(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="btn-send" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- 档案选择模态 -->
  <div class="modal-overlay" id="profile-select-modal" onclick="handleModalBg(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">选择解读档案</div>
      <div class="profile-select-list" id="profile-select-list">加载中...</div>
    </div>
  </div>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <a href="/static/index.html" class="nav-item">
      <span class="nav-icon">🏠</span><span>首页</span>
    </a>
    <a href="/static/chat.html" class="nav-item active">
      <span class="nav-icon">🤖</span><span>AI问答</span>
    </a>
    <a href="/static/community.html" class="nav-item">
      <span class="nav-icon">💫</span><span>社区</span>
    </a>
    <a href="/static/me.html" class="nav-item">
      <span class="nav-icon">👤</span><span>我的</span>
    </a>
  </nav>

  <script src="/static/common.js"></script>
  <script>
    let currentProfileId = null;
    let profiles = [];
    let isSending = false;

    function handleModalBg(e) {
      if (e.target === e.currentTarget) closeModal('profile-select-modal');
    }

    async function init() {
      if (!Auth.requireLogin()) return;
      const user = Auth.getUser();
      if (user && !user.is_vip) {
        document.getElementById('vip-banner').style.display = 'flex';
      }

      await loadProfiles();
    }

    async function loadProfiles() {
      try {
        const data = await api.get('/api/profile');
        profiles = data.profiles || [];

        if (profiles.length === 0) {
          document.getElementById('cp-name').textContent = '暂无档案';
          document.getElementById('cp-sign').textContent = '请先在首页创建档案';
          return;
        }

        const savedId = parseInt(localStorage.getItem('current_profile_id'));
        const profile = profiles.find(p => p.id === savedId) || profiles.find(p => p.is_self) || profiles[0];
        await selectProfile(profile.id);

        // 填充档案选择列表
        updateProfileSelectList();
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    function updateProfileSelectList() {
      const list = document.getElementById('profile-select-list');
      list.innerHTML = profiles.map(p => `
        <div class="profile-select-item ${p.id === currentProfileId ? 'selected' : ''}"
             onclick="selectProfileAndClose(${p.id})">
          <div class="psi-sign">${signEmoji(p.sun_sign_cn)}</div>
          <div>
            <div class="psi-name">${p.name} <span style="font-size:11px;color:var(--text-muted)">${p.relationship}</span></div>
            <div class="psi-sign-text">☀️${p.sun_sign_cn} 🌙${p.moon_sign_cn} ⬆️${p.asc_sign_cn}</div>
          </div>
        </div>
      `).join('');
    }

    async function selectProfile(id) {
      currentProfileId = id;
      localStorage.setItem('current_profile_id', id);

      const profile = profiles.find(p => p.id === id);
      if (profile) {
        document.getElementById('cp-name').textContent = `${signEmoji(profile.sun_sign_cn)} ${profile.name}`;
        document.getElementById('cp-sign').textContent =
          `☀️${profile.sun_sign_cn} · 🌙${profile.moon_sign_cn} · ⬆️${profile.asc_sign_cn}`;
      }

      // 加载历史对话
      await loadHistory();
    }

    function selectProfileAndClose(id) {
      selectProfile(id);
      updateProfileSelectList();
      closeModal('profile-select-modal');
    }

    async function loadHistory() {
      if (!currentProfileId) return;
      try {
        const data = await api.get(`/api/chat/history?profile_id=${currentProfileId}&limit=30`);
        const msgs = document.getElementById('chat-messages');

        // 清除旧历史（保留欢迎消息）
        while (msgs.children.length > 1) msgs.removeChild(msgs.lastChild);

        data.history.forEach(log => {
          appendMessage(log.role === 'ai' ? 'ai' : 'user', log.content, log.created_at);
        });

        scrollToBottom();
      } catch (err) {
        console.error('加载历史失败:', err);
      }
    }

    async function clearHistory() {
      if (!currentProfileId) return;
      if (!confirm('确定清空与该档案的对话记录？')) return;
      try {
        await api.delete(`/api/chat/history?profile_id=${currentProfileId}`);
        const msgs = document.getElementById('chat-messages');
        while (msgs.children.length > 1) msgs.removeChild(msgs.lastChild);
        toast('对话已清空', 'success');
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    function appendMessage(role, content, time) {
      const msgs = document.getElementById('chat-messages');
      const timeStr = time ? timeAgo(time) : '刚刚';
      const isAi = role === 'ai';

      const el = document.createElement('div');
      el.className = `msg-row ${isAi ? '' : 'user'}`;
      el.innerHTML = `
        <div class="msg-avatar ${isAi ? 'ai' : 'user'}">${isAi ? '🔮' : (svgIcon('user') || '👤')}</div>
        <div>
          <div class="msg-bubble ${isAi ? 'ai' : 'user'}">${content.replace(/\n/g, '<br>')}</div>
          <div class="msg-time">${timeStr}</div>
        </div>
      `;
      msgs.appendChild(el);
    }

    function showTyping() {
      const msgs = document.getElementById('chat-messages');
      const el = document.createElement('div');
      el.className = 'msg-row';
      el.id = 'typing-indicator';
      el.innerHTML = `
        <div class="msg-avatar ai">🔮</div>
        <div class="msg-bubble ai">
          <div class="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      `;
      msgs.appendChild(el);
      scrollToBottom();
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function scrollToBottom() {
      const msgs = document.getElementById('chat-messages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    async function sendMessage() {
      if (isSending) return;
      const input = document.getElementById('msg-input');
      const message = input.value.trim();

      if (!message) { toast('请输入问题', 'info'); return; }
      if (!currentProfileId) { toast('请先选择档案', 'error'); return; }

      isSending = true;
      input.value = '';
      input.style.height = 'auto';
      document.getElementById('btn-send').disabled = true;

      appendMessage('user', message);
      showTyping();
      scrollToBottom();

      try {
        const data = await api.post('/api/chat', {
          message,
          profile_id: currentProfileId,
        });
        removeTyping();
        appendMessage('ai', data.reply);
        scrollToBottom();
      } catch (err) {
        removeTyping();
        appendMessage('ai', `抱歉，占星师暂时无法回应：${err.message}`);
        scrollToBottom();
      } finally {
        isSending = false;
        document.getElementById('btn-send').disabled = false;
      }
    }

    function sendQuickQ(el) {
      document.getElementById('msg-input').value = el.textContent;
      sendMessage();
    }

    function handleEnter(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }

    init();
  </script>
</body>
</html>
