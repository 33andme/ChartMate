<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>我的 - 占星APP</title>
  <link rel="stylesheet" href="/static/common.css">
  <style>
    /* ── 用户头像区 ── */
    .user-hero {
      background: linear-gradient(160deg, #1a0533 0%, #0d0d1a 70%);
      padding: 32px 20px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    body.light .user-hero {
      background: linear-gradient(160deg, #ddd0ff 0%, #f0ebff 70%);
    }
    /* 装饰星点 */
    .user-hero::before {
      content: '✦ ✧ ✦ ✦ ✧ ✦ ✧ ✦';
      position: absolute;
      top: 12px; left: 0; right: 0;
      font-size: 10px;
      letter-spacing: 18px;
      color: rgba(167,139,250,0.35);
      pointer-events: none;
    }
    body.light .user-hero::before {
      color: rgba(124,58,237,0.25);
    }
    .user-hero::after {
      content: '';
      position: absolute;
      bottom: -60px; left: 50%;
      transform: translateX(-50%);
      width: 240px; height: 120px;
      background: radial-gradient(ellipse, rgba(124,58,237,0.25) 0%, transparent 70%);
    }
    body.light .user-hero::after {
      background: radial-gradient(ellipse, rgba(124,58,237,0.15) 0%, transparent 70%);
    }
    .user-avatar {
      width: 80px; height: 80px;
      background: var(--gradient-purple);
      border-radius: 50%;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      border: 3px solid rgba(167,139,250,0.3);
      box-shadow: 0 0 24px rgba(124,58,237,0.4);
      position: relative;
      z-index: 1;
    }
    .user-email { font-size: 16px; font-weight: 600; margin-bottom: 8px; position: relative; z-index: 1; }
    .user-joined { font-size: 12px; color: var(--text-muted); position: relative; z-index: 1; }

    .vip-card {
      background: linear-gradient(135deg, rgba(245,158,11,0.15) 0%, rgba(239,68,68,0.1) 100%);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 14px;
      padding: 14px 18px;
      margin: 0 16px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .vip-card-left { display: flex; align-items: center; gap: 10px; }
    .vip-icon { font-size: 28px; }
    .vip-title { font-size: 14px; font-weight: 700; color: #fbbf24; }
    .vip-desc { font-size: 11px; color: var(--text-muted); }
    .btn-upgrade {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-active-vip {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #6ee7b7;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 12px;
    }

    /* ── VIP 套餐弹窗 ── */
    .plan-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .plan-item {
      background: var(--bg-card2);
      border: 2px solid var(--border-subtle);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .plan-item.selected { border-color: var(--accent-gold); background: rgba(245,158,11,0.08); }
    .plan-item:hover { border-color: rgba(245,158,11,0.5); }
    .plan-name { font-size: 15px; font-weight: 700; }
    .plan-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .plan-price { font-size: 20px; font-weight: 800; color: #f59e0b; }
    .plan-price span { font-size: 12px; font-weight: 400; color: var(--text-muted); }
    .plan-badge {
      font-size: 11px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
    }
    .vip-perks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .perk-item {
      background: var(--bg-card2);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .perk-item .perk-icon { font-size: 20px; }

    /* ── 档案列表 ── */
    .profile-list-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .profile-list-item:hover { border-color: var(--accent-purple); box-shadow: var(--shadow-glow); }
    .pli-sign { font-size: 32px; }
    .pli-info { flex: 1; }
    .pli-name { font-size: 15px; font-weight: 600; }
    .pli-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .pli-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* ── 设置列表 ── */
    .settings-list { background: var(--bg-card); border-radius: var(--radius-card); overflow: hidden; border: 1px solid var(--border-subtle); }
    .settings-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background 0.15s;
    }
    .settings-item:last-child { border-bottom: none; }
    .settings-item:hover { background: rgba(124,58,237,0.06); }
    .settings-item-left { display: flex; align-items: center; gap: 12px; }
    .settings-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .settings-label { font-size: 15px; }
    .settings-desc { font-size: 12px; color: var(--text-muted); }
    .settings-arrow { color: var(--text-muted); font-size: 13px; }

    /* ── 统计数字 ── */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 16px 12px;
      text-align: center;
    }
    .stat-num {
      font-size: 24px; font-weight: 800;
      background: var(--gradient-purple);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>
  <!-- 用户头像区 -->
  <div class="user-hero">
    <div class="user-avatar" id="user-avatar">🌙</div>
    <div class="user-email" id="user-email">加载中...</div>
    <div class="user-joined" id="user-joined"></div>
    <div style="margin-top:12px" id="user-vip-badge"></div>
  </div>

  <div class="page-content" style="padding-top:16px">
    <!-- VIP 卡片 -->
    <div class="vip-card" id="vip-card">
      <div class="vip-card-left">
        <div class="vip-icon">👑</div>
        <div>
          <div class="vip-title">升级 VIP</div>
          <div class="vip-desc">解锁高级 AI 模型，获得更深度星盘解读</div>
        </div>
      </div>
      <button class="btn-upgrade" onclick="openModal('vip-modal')">升级 VIP</button>
    </div>

    <!-- 统计 -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-profiles">0</div>
        <div class="stat-label">个人档案</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-chats">--</div>
        <div class="stat-label">AI对话次数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-posts">--</div>
        <div class="stat-label">发布帖子</div>
      </div>
    </div>

    <!-- 我的档案 -->
    <div class="section-title">我的档案</div>
    <div id="profile-list">
      <div style="text-align:center;padding:20px;color:var(--text-muted)"><span class="spinner"></span></div>
    </div>
    <button class="btn-outline" style="width:100%;margin-bottom:20px" onclick="openModal('add-profile-modal')">
      + 新建档案
    </button>

    <!-- 设置 -->
    <div class="section-title">设置</div>
    <div class="settings-list" style="margin-bottom:16px">
      <div class="settings-item" onclick="Theme.toggle(); updateThemeDesc()">
        <div class="settings-item-left">
          <div class="settings-icon" style="background:rgba(124,58,237,0.15)">🎨</div>
          <div>
            <div class="settings-label">主题风格</div>
            <div class="settings-desc" id="theme-desc">深色模式</div>
          </div>
        </div>
        <span class="settings-arrow" data-theme-toggle>☀️ 切换</span>
      </div>
    </div>

    <button class="btn-outline" style="width:100%;border-color:rgba(239,68,68,0.4);color:#f87171"
            onclick="confirmLogout()">
      退出登录
    </button>
  </div>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <a href="/static/index.html" class="nav-item">
      <span class="nav-icon">🏠</span><span>首页</span>
    </a>
    <a href="/static/chat.html" class="nav-item">
      <span class="nav-icon">🤖</span><span>AI问答</span>
    </a>
    <a href="/static/community.html" class="nav-item">
      <span class="nav-icon">💫</span><span>社区</span>
    </a>
    <a href="/static/me.html" class="nav-item active">
      <span class="nav-icon">👤</span><span>我的</span>
    </a>
  </nav>

  <!-- VIP 升级弹窗 -->
  <div class="modal-overlay" id="vip-modal" onclick="handleBg(event,'vip-modal')">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">👑 升级 VIP 会员</div>

      <!-- 权益说明 -->
      <div class="vip-perks">
        <div class="perk-item"><span class="perk-icon">🤖</span>高级 AI 模型</div>
        <div class="perk-item"><span class="perk-icon">🌐</span>完整星盘报告</div>
        <div class="perk-item"><span class="perk-icon">💬</span>无限次 AI 问答</div>
        <div class="perk-item"><span class="perk-icon">⚡</span>优先响应速度</div>
      </div>

      <!-- 套餐选择 -->
      <div class="plan-list" id="plan-list">
        <div class="plan-item selected" data-plan="monthly" onclick="selectPlan(this,'monthly')">
          <div>
            <div class="plan-name">月度会员</div>
            <div class="plan-desc">连续30天尊享权益</div>
          </div>
          <div class="plan-price">¥9.9<span>/月</span></div>
        </div>
        <div class="plan-item" data-plan="quarterly" onclick="selectPlan(this,'quarterly')">
          <div>
            <div class="plan-name">季度会员 <span class="plan-badge">推荐</span></div>
            <div class="plan-desc">连续90天，相当于¥8.3/月</div>
          </div>
          <div class="plan-price">¥24.9<span>/季</span></div>
        </div>
        <div class="plan-item" data-plan="yearly" onclick="selectPlan(this,'yearly')">
          <div>
            <div class="plan-name">年度会员 <span class="plan-badge">最划算</span></div>
            <div class="plan-desc">连续365天，相当于¥5.7/月</div>
          </div>
          <div class="plan-price">¥68<span>/年</span></div>
        </div>
      </div>

      <button class="btn-primary" id="btn-activate-vip" onclick="activateVip()"
              style="background:linear-gradient(135deg,#f59e0b,#ef4444);box-shadow:0 4px 15px rgba(245,158,11,0.4)">
        👑 立即开通（测试直接激活）
      </button>
      <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:10px">
        测试环境无需支付，点击直接激活
      </p>
    </div>
  </div>

  <!-- 新建档案模态框 -->
  <div class="modal-overlay" id="add-profile-modal" onclick="handleBg(event,'add-profile-modal')">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">✨ 新建档案</div>

      <div class="input-group">
        <label>姓名</label>
        <input class="input-field" id="p-name" placeholder="请输入姓名">
      </div>
      <div style="display:flex;gap:10px">
        <div class="input-group" style="flex:1">
          <label>与我的关系</label>
          <select class="input-field" id="p-rel">
            <option value="本人" style="color: #a171e4 !important;">本人</option>
            <option value="伴侣" style="color: #a171e4 !important;">伴侣</option>
            <option value="父母" style="color: #a171e4 !important;">父母</option>
            <option value="朋友" style="color: #a171e4 !important;">朋友</option>
            <option value="子女" style="color: #a171e4 !important;">子女</option>
          </select>
        </div>
        <div class="input-group" style="flex:1">
          <label>性别</label>
          <select class="input-field" id="p-gender">
            <option value="" style="color: #a171e4 !important;">不填</option>
            <option value="男" style="color: #a171e4 !important;">男</option>
            <option value="女" style="color: #a171e4 !important;">女</option>
          </select>
        </div>
      </div>
      <div class="input-group">
        <label>出生时间</label>
        <input class="input-field" id="p-birth-time" type="datetime-local" value="1995-01-01T12:00">
      </div>
      <div style="display:flex;gap:10px">
        <div class="input-group city-select" style="flex:1">
          <label>出生城市</label>
          <select class="input-field" id="p-birth-city" data-color-override="#a171e4">
            <option value="">选择城市...</option>
          </select>
        </div>
        <div class="input-group city-select" style="flex:1">
          <label>现居城市</label>
          <select class="input-field" id="p-current-city" data-color-override="#a171e4">
            <option value="">选择城市...</option>
          </select>
        </div>
      </div>
      <div class="input-group">
        <label>MBTI（可选）</label>
        <input class="input-field" id="p-mbti" placeholder="如：INFP">
      </div>
      <button class="btn-primary" id="btn-create-p" onclick="createProfile()">
        🔮 创建档案并计算星盘
      </button>
    </div>
  </div>

  <script src="/static/common.js"></script>
  <script>
    function handleBg(e, id) {
      if (e.target === e.currentTarget) closeModal(id);
    }

    async function loadUserInfo() {
      if (!Auth.requireLogin()) return;
      try {
        const data = await api.get('/api/auth/me');
        const user = data;

        // 设置头像字母
        document.getElementById('user-avatar').textContent = user.email[0].toUpperCase();
        // 脱敏邮箱
        const [local, domain] = user.email.split('@');
        document.getElementById('user-email').textContent =
          local.slice(0, 3) + '***@' + domain;
        document.getElementById('user-joined').textContent =
          '加入于 ' + new Date(user.created_at).toLocaleDateString('zh-CN');

        // VIP 状态
        const vipBadge = document.getElementById('user-vip-badge');
        const vipCard = document.getElementById('vip-card');
        if (user.is_vip) {
          vipBadge.innerHTML = '<span class="badge badge-vip">👑 VIP 会员</span>';
          vipCard.querySelector('.btn-upgrade').parentElement.innerHTML =
            `<div class="vip-card-left"><div class="vip-icon">👑</div>
             <div><div class="vip-title" style="color:#6ee7b7">VIP 已激活</div>
             <div class="vip-desc">到期：${user.vip_expiry ? new Date(user.vip_expiry).toLocaleDateString('zh-CN') : '永久'}</div>
             </div></div><span class="btn-active-vip">✓ 已激活</span>`;
        } else {
          vipBadge.innerHTML = '<span class="badge badge-purple">免费会员</span>';
        }

        // 更新本地缓存
        Auth.setUser(user);

        // 加载档案
        loadProfiles();
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    async function loadProfiles() {
      try {
        const data = await api.get('/api/profile');
        const profiles = data.profiles || [];
        document.getElementById('stat-profiles').textContent = profiles.length;

        const list = document.getElementById('profile-list');
        if (profiles.length === 0) {
          list.innerHTML = `<div class="empty-state" style="padding:20px 0">
            <div class="empty-icon" style="font-size:32px">📝</div>
            <p>还没有档案，快去创建吧</p>
          </div>`;
          return;
        }

        list.innerHTML = profiles.map(p => `
          <div class="profile-list-item" onclick="viewProfile(${p.id})">
            <div class="pli-sign">${signEmoji(p.sun_sign_cn) || '⭐'}</div>
            <div class="pli-info">
              <div class="pli-name">${p.name} ${p.is_self ? '<span class="badge badge-purple" style="font-size:10px">本人</span>' : ''}</div>
              <div class="pli-sub">
                ☀️${p.sun_sign_cn} · 🌙${p.moon_sign_cn} · ⬆️${p.asc_sign_cn}
                <span style="margin-left:6px">${p.birth_city}</span>
              </div>
            </div>
            <button class="pli-delete" onclick="deleteProfile(event, ${p.id})">🗑️</button>
          </div>
        `).join('');
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    function viewProfile(id) {
      localStorage.setItem('current_profile_id', id);
      window.location.href = '/static/index.html';
    }

    async function deleteProfile(e, id) {
      e.stopPropagation();
      if (!confirm('确定删除该档案？相关运势和对话记录也会失效。')) return;
      try {
        await api.delete(`/api/profile/${id}`);
        toast('档案已删除', 'success');
        loadProfiles();
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    async function createProfile() {
      const name = document.getElementById('p-name').value.trim();
      const rel = document.getElementById('p-rel').value;
      const gender = document.getElementById('p-gender').value;
      const birthTime = document.getElementById('p-birth-time').value;
      const birthCity = document.getElementById('p-birth-city').value.trim();
      const currentCity = document.getElementById('p-current-city').value.trim();
      const mbti = document.getElementById('p-mbti').value.trim();

      if (!name) { toast('请输入姓名', 'error'); return; }
      if (!birthCity) { toast('请输入出生城市', 'error'); return; }
      if (!currentCity) { toast('请输入现居城市', 'error'); return; }

      const btn = document.getElementById('btn-create-p');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 计算星盘中...';

      try {
        const result = await api.post('/api/profile', {
          name, relationship: rel, is_self: rel === '本人',
          birth_city: birthCity, current_city: currentCity,
          birth_time: birthTime, gender: gender || null, mbti: mbti || null,
        });

        // 检查是否有地点警告信息
        if (result.location_warning) {
          toast(result.location_warning, 'warning');
        } else {
          toast('档案创建成功！', 'success');
        }

        closeModal('add-profile-modal');
        loadProfiles();
      } catch (err) {
        toast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '🔮 创建档案并计算星盘';
      }
    }

    function confirmLogout() {
      if (confirm('确定退出登录？')) Auth.logout();
    }

    // ── VIP ──────────────────────────────────────────
    let selectedPlan = 'monthly';

    function selectPlan(el, plan) {
      selectedPlan = plan;
      document.querySelectorAll('.plan-item').forEach(p => p.classList.remove('selected'));
      el.classList.add('selected');
    }

    async function activateVip() {
      const btn = document.getElementById('btn-activate-vip');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 激活中...';
      try {
        const data = await api.post(`/api/vip/activate?plan=${selectedPlan}`);
        toast(data.message, 'success');
        closeModal('vip-modal');
        // 更新本地用户信息
        const user = Auth.getUser() || {};
        user.is_vip = true;
        user.vip_expiry = data.vip_expiry;
        Auth.setUser(user);
        // 刷新页面用户信息
        loadUserInfo();
      } catch (err) {
        toast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '👑 立即开通（测试直接激活）';
      }
    }

    function updateThemeDesc() {
      const desc = document.getElementById('theme-desc');
      const arrow = document.querySelector('[data-theme-toggle]');
      if (Theme.current === 'dark') {
        desc.textContent = '深色模式';
        arrow.textContent = '☀️ 切换';
      } else {
        desc.textContent = '浅色模式';
        arrow.textContent = '🌙 切换';
      }
    }

    loadUserInfo();
    updateThemeDesc();

    // 加载城市数据
    loadCities();

    async function loadCities() {
      try {
        const data = await api.get('/api/cities');
        const groupedCities = data.grouped_cities || {};
        const otherCities = data.other_cities || [];

        // 填充城市下拉框
        const birthCitySelect = document.getElementById('p-birth-city');
        const currentCitySelect = document.getElementById('p-current-city');

        // 创建选项
        let birthCityOptions = '<option value="">选择城市...</option>';
        let currentCityOptions = '<option value="">选择城市...</option>';

        // 按区域分组添加城市
        Object.keys(groupedCities).forEach(region => {
          const cities = groupedCities[region];
          if (cities.length > 0) {
            birthCityOptions += `<optgroup label="${region}">`;
            currentCityOptions += `<optgroup label="${region}">`;

            cities.forEach(city => {
              birthCityOptions += `<option value="${city.name}" style="color: #a171e4 !important;">${city.name}</option>`;
              currentCityOptions += `<option value="${city.name}" style="color: #a171e4 !important;">${city.name}</option>`;
            });

            birthCityOptions += '</optgroup>';
            currentCityOptions += '</optgroup>';
          }
        });

        // 添加其他城市（如果有的话）
        if (otherCities.length > 0) {
          birthCityOptions += '<optgroup label="其他城市">';
          currentCityOptions += '<optgroup label="其他城市">';

          otherCities.forEach(city => {
            birthCityOptions += `<option value="${city.name}" style="color: #a171e4 !important;">${city.name}</option>`;
            currentCityOptions += `<option value="${city.name}" style="color: #a171e4 !important;">${city.name}</option>`;
          });

          birthCityOptions += '</optgroup>';
          currentCityOptions += '</optgroup>';
        }

        birthCitySelect.innerHTML = birthCityOptions;
        currentCitySelect.innerHTML = currentCityOptions;

        // 设置所有下拉框文字颜色
        setTimeout(function() {
          const allSelects = document.querySelectorAll('select');
          allSelects.forEach(select => {
            // 设置选择框本身的文字颜色
            select.style.color = '#a171e4';

            // 设置所有选项的文字颜色
            Array.from(select.options).forEach(option => {
              option.style.color = '#a171e4';
            });
          });
        }, 500);
      } catch (err) {
        console.error('加载城市列表失败:', err);
        toast('加载城市列表失败，请刷新重试', 'error');
      }
    }
  </script>
</body>
</html>
